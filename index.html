<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>GYLOtest - Person Occlusion AR</title>
  <style>
    :root{color-scheme:dark;--bg:#070b16;--panel:#151b2f;--panel2:#1f2740;--text:#f5f7ff;--muted:#aeb7d4;--accent:#67d7ff;--ok:#7dffb2;--danger:#ff6b8a;--warn:#ffd36a}
    html,body{touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#21305d 0,var(--bg) 48%,#03050c 100%);color:var(--text);padding:calc(14px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom))}main{max-width:820px;margin:0 auto}h1{margin:0 0 8px;font-size:28px}h2{margin:0 0 12px;font-size:20px}p{color:var(--muted);line-height:1.65}.panel{margin-top:14px;padding:14px;border-radius:22px;background:rgba(21,27,47,.92);border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 40px rgba(0,0,0,.28)}button,label.fileButton{width:100%;appearance:none;border:0;border-radius:16px;padding:15px 16px;font-size:17px;font-weight:800;color:#04111a;background:linear-gradient(135deg,var(--accent),var(--ok));box-shadow:0 10px 28px rgba(0,0,0,.28);text-align:center;display:block;touch-action:manipulation}button.secondary,label.secondary{color:var(--text);background:var(--panel2);border:1px solid rgba(255,255,255,.1)}button.danger{color:#21020a;background:linear-gradient(135deg,#ff8ba2,#ffd36a)}button:active,label.fileButton:active{transform:translateY(1px)}input[type=file]{display:none}.buttonGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.status{font-size:14px;color:var(--muted);word-break:break-word}.status strong{color:var(--text)}.warning{color:var(--danger)}
    .cameraStage{position:relative;overflow:hidden;border-radius:22px;background:#000;height:min(70vh,720px);min-height:380px;border:1px solid rgba(255,255,255,.1);touch-action:none}#cameraPreview{display:none}#compositeCanvas{width:100%;height:100%;display:block;background:#000}.hudLayer{position:absolute;inset:0;pointer-events:none;overflow:hidden}.reticle{position:absolute;left:50%;top:50%;width:86px;height:86px;margin-left:-43px;margin-top:-43px;border:3px solid rgba(103,215,255,.95);border-radius:999px;box-shadow:0 0 22px rgba(103,215,255,.8);transform:translate(0,0) rotate(0deg);will-change:transform}.reticle:before,.reticle:after{content:"";position:absolute;background:rgba(125,255,178,.95);left:50%;top:50%;transform:translate(-50%,-50%)}.reticle:before{width:112px;height:3px}.reticle:after{width:3px;height:112px}.readout{position:absolute;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.readoutItem{padding:8px;border-radius:12px;background:rgba(0,0,0,.48);backdrop-filter:blur(10px);font-size:12px;color:var(--muted)}.readoutItem b{display:block;color:#fff;font-size:17px;font-variant-numeric:tabular-nums}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.value{padding:12px;border-radius:16px;background:var(--panel2)}.label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.number{font-variant-numeric:tabular-nums;font-size:22px;font-weight:800}.mediaPreview{margin-top:12px;display:grid;gap:10px}.mediaPreview img,.mediaPreview video{width:100%;max-height:360px;object-fit:contain;border-radius:18px;background:#000;border:1px solid rgba(255,255,255,.1)}.smallText{font-size:13px;color:var(--muted)}.rangeRow{display:grid;grid-template-columns:120px 1fr 54px;gap:10px;align-items:center;margin-top:10px;color:var(--muted);font-size:13px}.rangeRow input{width:100%}.rangeRow b{color:#fff;text-align:right;font-variant-numeric:tabular-nums}canvas.hiddenCanvas{display:none}
    @media(max-width:420px){.buttonGrid{grid-template-columns:1fr}.cameraStage{height:64vh;min-height:320px}.readout{grid-template-columns:1fr 1fr 1fr}.readoutItem b{font-size:15px}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
</head>
<body>
<main>
  <h1>GYLOtest Person Occlusion</h1>
  <p>人物マスクを使い、カメラ映像 → 浮かせたい素材 → 人物だけ再描画 の順で合成します。人物の後ろに写真が隠れるAR風テストです。</p>

  <section id="cameraStage" class="panel cameraStage">
    <video id="cameraPreview" playsinline muted autoplay></video>
    <canvas id="compositeCanvas"></canvas>
    <div class="hudLayer">
      <div id="reticle" class="reticle"></div>
      <div class="readout">
        <div class="readoutItem">左右 gamma<b id="hudGamma">-</b></div>
        <div class="readoutItem">前後 beta<b id="hudBeta">-</b></div>
        <div class="readoutItem">人物隠蔽<b id="hudOcclusion">OFF</b></div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="buttonGrid">
      <button id="startButton">センサー＋カメラ開始</button>
      <button id="resetButton" class="secondary">位置リセット</button>
      <button id="placePhotoButton" class="secondary">写真を空間に配置</button>
      <button id="toggleOcclusionButton" class="secondary">人物隠蔽 ON</button>
      <button id="photoButton" class="secondary">写真を撮る</button>
      <button id="recordButton" class="secondary">動画録画開始</button>
    </div>
    <div class="buttonGrid">
      <label class="fileButton secondary" for="photoUpload">写真アップロード</label>
      <label class="fileButton secondary" for="videoUpload">動画アップロード</label>
    </div>
    <input id="photoUpload" type="file" accept="image/*">
    <input id="videoUpload" type="file" accept="video/*">
    <div class="rangeRow"><span>距離</span><input id="photoDistance" type="range" min="1" max="5" step="0.1" value="2.6"><b id="distanceLabel">2.6</b></div>
    <div class="rangeRow"><span>サイズ</span><input id="photoScale" type="range" min="0.5" max="2" step="0.05" value="1"><b id="scaleLabel">1.00</b></div>
    <div class="rangeRow"><span>人物判定</span><input id="maskThreshold" type="range" min="30" max="230" step="5" value="135"><b id="thresholdLabel">135</b></div>
    <div class="rangeRow"><span>境界ぼかし</span><input id="maskBlur" type="range" min="0" max="6" step="1" value="0"><b id="blurLabel">0</b></div>
  </section>

  <section class="panel"><div id="status" class="status"><strong>状態:</strong> 未開始</div></section>

  <section class="panel">
    <h2>DeviceOrientation</h2>
    <div class="grid">
      <div class="value"><span class="label">alpha / 方角</span><span id="alpha" class="number">-</span></div>
      <div class="value"><span class="label">beta / 前後</span><span id="beta" class="number">-</span></div>
      <div class="value"><span class="label">gamma / 左右</span><span id="gamma" class="number">-</span></div>
      <div class="value"><span class="label">interval</span><span id="interval" class="number">-</span></div>
    </div>
  </section>

  <section class="panel">
    <h2>撮影・アップロードプレビュー</h2>
    <p class="smallText">人物判定を上げると背景の誤検出が減り、下げると髪や手先が残りやすくなります。境界ぼかしは0〜1程度がおすすめです。</p>
    <div id="mediaPreview" class="mediaPreview"></div>
  </section>
</main>
<canvas id="captureCanvas" class="hiddenCanvas"></canvas>
<canvas id="maskCanvas" class="hiddenCanvas"></canvas>
<canvas id="personCanvas" class="hiddenCanvas"></canvas>
<script>
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
let lastTouchEndTime=0;document.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTouchEndTime<350)e.preventDefault();lastTouchEndTime=now},{passive:false});

const cameraStage=document.getElementById('cameraStage'),startButton=document.getElementById('startButton'),resetButton=document.getElementById('resetButton'),placePhotoButton=document.getElementById('placePhotoButton'),toggleOcclusionButton=document.getElementById('toggleOcclusionButton'),photoButton=document.getElementById('photoButton'),recordButton=document.getElementById('recordButton'),statusText=document.getElementById('status'),cameraPreview=document.getElementById('cameraPreview'),compositeCanvas=document.getElementById('compositeCanvas'),compositeContext=compositeCanvas.getContext('2d'),captureCanvas=document.getElementById('captureCanvas'),maskCanvas=document.getElementById('maskCanvas'),maskContext=maskCanvas.getContext('2d'),personCanvas=document.getElementById('personCanvas'),personContext=personCanvas.getContext('2d'),mediaPreview=document.getElementById('mediaPreview'),photoUpload=document.getElementById('photoUpload'),videoUpload=document.getElementById('videoUpload'),reticle=document.getElementById('reticle'),photoDistance=document.getElementById('photoDistance'),photoScale=document.getElementById('photoScale'),maskThreshold=document.getElementById('maskThreshold'),maskBlur=document.getElementById('maskBlur'),distanceLabel=document.getElementById('distanceLabel'),scaleLabel=document.getElementById('scaleLabel'),thresholdLabel=document.getElementById('thresholdLabel'),blurLabel=document.getElementById('blurLabel');
const t={alpha:document.getElementById('alpha'),beta:document.getElementById('beta'),gamma:document.getElementById('gamma'),interval:document.getElementById('interval'),hudGamma:document.getElementById('hudGamma'),hudBeta:document.getElementById('hudBeta'),hudOcclusion:document.getElementById('hudOcclusion')};
let cameraStream=null,orientationStarted=false,motionStarted=false,renderStarted=false,currentOrientation={alpha:0,beta:0,gamma:0},baseOrientation={alpha:0,beta:0,gamma:0},hasBase=false,photoAnchor=null,uploadedImage=null,uploadedPhotoUrl='',segmentation=null,segmentationReady=false,occlusionEnabled=false,latestMaskImage=null,processingSegmentation=false,lastSegmentationTime=0,mediaRecorder=null,recordedChunks=[],isRecording=false;
function setStatus(m,w=false){statusText.innerHTML=`<strong>状態:</strong> ${m}`;statusText.classList.toggle('warning',w)}function f(v,d=2){return v==null||Number.isNaN(v)?'-':Number(v).toFixed(d)}function diffAngle(c,b){let d=c-b;while(d>180)d-=360;while(d<-180)d+=360;return d}async function req(cls,name){if(!cls)return'unsupported';if(typeof cls.requestPermission!=='function')return'not-required';const p=await cls.requestPermission();if(p!=='granted')throw new Error(`${name} の利用が許可されませんでした`);return'granted'}
async function startCamera(){if(!navigator.mediaDevices?.getUserMedia)throw new Error('このブラウザはカメラAPIに対応していません');if(cameraStream)return'already-started';cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:true});cameraPreview.srcObject=cameraStream;await cameraPreview.play();resizeCanvases(true);return'started'}
function resizeCanvases(force=false){const rect=cameraStage.getBoundingClientRect();const dpr=Math.min(window.devicePixelRatio||1,2);const w=Math.max(320,Math.round(rect.width*dpr));const h=Math.max(320,Math.round(rect.height*dpr));if(force||compositeCanvas.width!==w||compositeCanvas.height!==h){[compositeCanvas,captureCanvas,maskCanvas,personCanvas].forEach(c=>{c.width=w;c.height=h})}}
async function initSegmentation(){if(segmentationReady)return;if(!window.SelfieSegmentation)throw new Error('人物マスクライブラリの読み込みに失敗しました');segmentation=new SelfieSegmentation({locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});segmentation.setOptions({modelSelection:1,selfieMode:false});segmentation.onResults(results=>{latestMaskImage=results.segmentationMask;processingSegmentation=false});segmentationReady=true}
async function runSegmentationIfNeeded(){if(!occlusionEnabled||!segmentationReady||processingSegmentation||cameraPreview.videoWidth===0)return;const now=performance.now();if(now-lastSegmentationTime<110)return;lastSegmentationTime=now;processingSegmentation=true;try{await segmentation.send({image:cameraPreview})}catch(e){processingSegmentation=false;setStatus(`人物マスク処理エラー: ${e.message}`,true)}}
startButton.addEventListener('click',async()=>{try{setStatus('権限確認中...');const op=await req(window.DeviceOrientationEvent,'DeviceOrientationEvent');const mp=await req(window.DeviceMotionEvent,'DeviceMotionEvent');const cs=await startCamera();if(window.DeviceOrientationEvent&&!orientationStarted){window.addEventListener('deviceorientation',handleOrientation,true);orientationStarted=true}if(window.DeviceMotionEvent&&!motionStarted){window.addEventListener('devicemotion',handleMotion,true);motionStarted=true}startButton.textContent='取得中';setStatus(`開始 / Camera: ${cs}, Orientation: ${op}, Motion: ${mp}`);if(!renderStarted){renderStarted=true;requestAnimationFrame(renderLoop)}}catch(e){setStatus(e.message,true)}});
toggleOcclusionButton.addEventListener('click',async()=>{try{if(!occlusionEnabled){setStatus('人物マスク初期化中...');await initSegmentation();occlusionEnabled=true;toggleOcclusionButton.textContent='人物隠蔽 OFF';toggleOcclusionButton.classList.remove('secondary');t.hudOcclusion.textContent='ON';setStatus('人物隠蔽をONにしました。人物判定スライダーで境界を調整してください。')}else{occlusionEnabled=false;toggleOcclusionButton.textContent='人物隠蔽 ON';toggleOcclusionButton.classList.add('secondary');t.hudOcclusion.textContent='OFF';setStatus('人物隠蔽をOFFにしました。')}}catch(e){setStatus(e.message,true)}});
resetButton.addEventListener('click',()=>{baseOrientation={...currentOrientation};hasBase=true;photoAnchor=null;setStatus('現在の向きを基準にしました。写真配置も解除しました。')});
placePhotoButton.addEventListener('click',()=>{if(!uploadedImage){setStatus('先に写真をアップロードまたは撮影してください',true);return}photoAnchor={...currentOrientation};setStatus('写真を現在向いている方向の奥に配置しました。人物隠蔽ONなら人の後ろに隠れます。')});
photoDistance.addEventListener('input',()=>distanceLabel.textContent=Number(photoDistance.value).toFixed(1));photoScale.addEventListener('input',()=>scaleLabel.textContent=Number(photoScale.value).toFixed(2));maskThreshold.addEventListener('input',()=>thresholdLabel.textContent=maskThreshold.value);maskBlur.addEventListener('input',()=>blurLabel.textContent=maskBlur.value);
photoUpload.addEventListener('change',e=>{const file=e.target.files?.[0];if(!file)return;uploadedPhotoUrl=URL.createObjectURL(file);uploadedImage=new Image();uploadedImage.onload=()=>setStatus(`写真を読み込みました: ${file.name}。「写真を空間に配置」を押してください。`);uploadedImage.src=uploadedPhotoUrl;showImagePreview(uploadedPhotoUrl,file.name,false)});
videoUpload.addEventListener('change',e=>{const file=e.target.files?.[0];if(!file)return;const u=URL.createObjectURL(file);showVideoPreview(u,file.name,false);setStatus(`動画を読み込みました: ${file.name}`)});
photoButton.addEventListener('click',()=>{if(!cameraStream){setStatus('先にカメラを開始してください',true);return}captureCanvas.getContext('2d').drawImage(compositeCanvas,0,0,captureCanvas.width,captureCanvas.height);captureCanvas.toBlob(b=>{if(!b)return;const u=URL.createObjectURL(b),name=`gylotest-photo-${Date.now()}.jpg`;uploadedPhotoUrl=u;uploadedImage=new Image();uploadedImage.src=u;showImagePreview(u,name,true);setStatus('現在の合成画面を写真化しました。素材として再配置できます。')},'image/jpeg',.92)});
recordButton.addEventListener('click',()=>{if(!compositeCanvas.captureStream){setStatus('このブラウザはCanvas録画に対応していません',true);return}if(isRecording){mediaRecorder.stop();return}recordedChunks=[];const stream=compositeCanvas.captureStream(24);const types=['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm'];const mime=types.find(x=>window.MediaRecorder&&MediaRecorder.isTypeSupported(x))||'';try{mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined)}catch(e){setStatus(`録画を開始できません: ${e.message}`,true);return}mediaRecorder.ondataavailable=e=>{if(e.data?.size>0)recordedChunks.push(e.data)};mediaRecorder.onstop=()=>{const type=mediaRecorder.mimeType||'video/mp4',blob=new Blob(recordedChunks,{type}),u=URL.createObjectURL(blob),ext=type.includes('webm')?'webm':'mp4';showVideoPreview(u,`gylotest-occlusion-${Date.now()}.${ext}`,true);isRecording=false;recordButton.textContent='動画録画開始';recordButton.classList.remove('danger');recordButton.classList.add('secondary');setStatus('合成映像の録画を停止しました。')};mediaRecorder.start();isRecording=true;recordButton.textContent='録画停止';recordButton.classList.remove('secondary');recordButton.classList.add('danger');setStatus('合成映像を録画中...')});
function drawCoverImage(ctx,img,x,y,w,h){const iw=img.videoWidth||img.naturalWidth||img.width,ih=img.videoHeight||img.naturalHeight||img.height;if(!iw||!ih)return;const s=Math.max(w/iw,h/ih),sw=w/s,sh=h/s,sx=(iw-sw)/2,sy=(ih-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
function getPhotoScreenState(){if(!photoAnchor)return null;const gD=currentOrientation.gamma-photoAnchor.gamma,bD=currentOrientation.beta-photoAnchor.beta,dist=Number(photoDistance.value),scale=Number(photoScale.value);const x=compositeCanvas.width/2+Math.max(-compositeCanvas.width,Math.min(compositeCanvas.width,-gD*42*(compositeCanvas.width/390)/dist));const y=compositeCanvas.height/2+Math.max(-compositeCanvas.height,Math.min(compositeCanvas.height,-bD*36*(compositeCanvas.height/640)/dist));const visible=Math.abs(gD)<32*dist&&Math.abs(bD)<28*dist;const w=compositeCanvas.width*.44*scale/dist;const ratio=(uploadedImage?.naturalHeight&&uploadedImage?.naturalWidth)?uploadedImage.naturalHeight/uploadedImage.naturalWidth:.75;return{x,y,w,h:w*ratio,visible,rot:gD*.5}}
function renderLoop(){resizeCanvases();if(cameraPreview.videoWidth){const w=compositeCanvas.width,h=compositeCanvas.height;compositeContext.clearRect(0,0,w,h);drawCoverImage(compositeContext,cameraPreview,0,0,w,h);const st=getPhotoScreenState();if(uploadedImage&&st){compositeContext.save();compositeContext.globalAlpha=st.visible?.96:.2;compositeContext.translate(st.x,st.y);compositeContext.rotate(st.rot*Math.PI/180);compositeContext.shadowColor='rgba(0,0,0,.55)';compositeContext.shadowBlur=30;compositeContext.drawImage(uploadedImage,-st.w/2,-st.h/2,st.w,st.h);compositeContext.restore()}if(occlusionEnabled&&latestMaskImage)drawPersonForeground();updateHud();runSegmentationIfNeeded()}requestAnimationFrame(renderLoop)}
function drawPersonForeground(){const w=compositeCanvas.width,h=compositeCanvas.height;maskContext.clearRect(0,0,w,h);maskContext.drawImage(latestMaskImage,0,0,w,h);const data=maskContext.getImageData(0,0,w,h);const pixels=data.data;const threshold=Number(maskThreshold.value);const feather=18;for(let i=0;i<pixels.length;i+=4){const score=pixels[i];let alpha=0;if(score>=threshold+feather){alpha=255}else if(score<=threshold-feather){alpha=0}else{alpha=Math.round(((score-(threshold-feather))/(feather*2))*255)}pixels[i]=255;pixels[i+1]=255;pixels[i+2]=255;pixels[i+3]=alpha}maskContext.putImageData(data,0,0);const blur=Number(maskBlur.value);if(blur>0){maskContext.filter=`blur(${blur}px)`;maskContext.drawImage(maskCanvas,0,0);maskContext.filter='none'}personContext.clearRect(0,0,w,h);drawCoverImage(personContext,cameraPreview,0,0,w,h);personContext.globalCompositeOperation='destination-in';personContext.drawImage(maskCanvas,0,0,w,h);personContext.globalCompositeOperation='source-over';compositeContext.drawImage(personCanvas,0,0,w,h)}
function updateHud(){const dB=currentOrientation.beta-baseOrientation.beta,dG=currentOrientation.gamma-baseOrientation.gamma;reticle.style.transform=`translate(${Math.max(-150,Math.min(150,dG*4))}px,${Math.max(-150,Math.min(150,dB*3))}px) rotate(${diffAngle(currentOrientation.alpha,baseOrientation.alpha)}deg)`;t.hudGamma.textContent=f(dG,1);t.hudBeta.textContent=f(dB,1)}
function handleOrientation(e){currentOrientation={alpha:e.alpha??0,beta:e.beta??0,gamma:e.gamma??0};t.alpha.textContent=f(e.alpha);t.beta.textContent=f(e.beta);t.gamma.textContent=f(e.gamma);if(!hasBase){baseOrientation={...currentOrientation};hasBase=true}}
function handleMotion(e){t.interval.textContent=f(e.interval,0)}
function showImagePreview(u,name,downloadable){mediaPreview.innerHTML='';const img=document.createElement('img');img.src=u;img.alt=name;mediaPreview.appendChild(img);if(downloadable)addDownloadLink(u,name)}function showVideoPreview(u,name,downloadable){mediaPreview.innerHTML='';const v=document.createElement('video');v.src=u;v.controls=true;v.playsInline=true;mediaPreview.appendChild(v);if(downloadable)addDownloadLink(u,name)}function addDownloadLink(u,name){const a=document.createElement('a');a.href=u;a.download=name;a.textContent=`保存: ${name}`;a.style.color='var(--accent)';a.style.fontWeight='800';a.style.wordBreak='break-all';mediaPreview.appendChild(a)}
window.addEventListener('resize',()=>resizeCanvases(true));
</script>
</body>
</html>
